name: Sync Fork

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync upstream
        run: |
          git remote add upstream https://github.com/scientxst/Commerce-Agent-LLM.git
          git fetch upstream
          git checkout main
          git merge upstream/main --no-edit
          git push origin main
