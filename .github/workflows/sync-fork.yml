name: Sync Fork

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Sync upstream
        run: |
          git remote add upstream https://github.com/scientxst/Commerce-Agent-LLM.git
          git fetch upstream
          git checkout main
          git rebase upstream/main
          git push origin main
